name: Fetch News Content
on:
  schedule:
    - cron: '17 */2 * * *' # Random minute offset
  workflow_dispatch:

# Prevents multiple scrapers from running simultaneously and causing Git merge conflicts
concurrency:
  group: scrape-news
  cancel-in-progress: false

jobs:
  scrape_content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout FetchNews
        uses: actions/checkout@v4

      # --- RANDOM JITTER STEP ---
      - name: Random Jitter Delay
        run: |
          # Sleep for a random time between 1 and 120 seconds (up to 2 mins)
          jitter=$(( ( RANDOM % 120 )  + 1 ))
          echo "[*] Adding random jitter of $jitter seconds to avoid detection..."
          sleep $jitter
      # ---------------------------

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install seleniumbase pandas
          sudo apt-get update
          sbase install chromedriver
          sudo apt-get install -y xvfb

      - name: Run Fetcher
        run: python main.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Cleanup Temp Files
        if: always() # Ensures cleanup even if the script crashes
        run: |
          rm -rf downloaded_files/
          find . -name "*.lock" -delete
          echo "[✓] Temporary SeleniumBase files and locks cleared."

      - name: Commit Master Logs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Checkpoint: Update master article logs (JSONL)"
          file_pattern: 'results/*.jsonl'